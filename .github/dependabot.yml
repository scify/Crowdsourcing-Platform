# Dependabot configuration — https://docs.github.com/code-security/dependabot
#
# Strategy: keep PR noise low while staying current and secure.
#   - minor/patch updates are grouped into a single PR per ecosystem
#   - major updates stay ungrouped so breaking changes get individual review
#   - `cooldown` delays brand-new releases, reducing supply-chain risk from
#     a compromised or broken just-published version
#   - GitHub Actions are kept patched (a compromised action runs in CI)
#
# Security (advisory-driven) updates also require "Dependabot security updates"
# to be enabled in the repository's Security settings.

version: 2

updates:
    # ---- PHP / Composer -------------------------------------------------
    - package-ecosystem: composer
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '06:00'
          timezone: Etc/UTC
      open-pull-requests-limit: 10
      versioning-strategy: increase
      cooldown:
          default-days: 7
      labels:
          - dependencies
          - php
      # Routine updates: minor/patch only. Major bumps are skipped here, but
      # security updates can still propose a major if that's the only fix.
      ignore:
          - dependency-name: '*'
            update-types:
                - version-update:semver-major
      groups:
          composer-minor-patch:
              applies-to: version-updates
              update-types:
                  - minor
                  - patch

    # ---- JavaScript / npm ----------------------------------------------
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '06:00'
          timezone: Etc/UTC
      open-pull-requests-limit: 10
      versioning-strategy: increase
      cooldown:
          default-days: 7
      labels:
          - dependencies
          - javascript
      # Routine updates: minor/patch only. Major bumps are skipped here, but
      # security updates can still propose a major if that's the only fix.
      ignore:
          - dependency-name: '*'
            update-types:
                - version-update:semver-major
      groups:
          npm-minor-patch:
              applies-to: version-updates
              update-types:
                  - minor
                  - patch

    # ---- GitHub Actions ------------------------------------------------
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
          time: '06:00'
          timezone: Etc/UTC
      open-pull-requests-limit: 10
      cooldown:
          default-days: 3
      labels:
          - dependencies
          - github-actions
      # Routine updates: minor/patch only. NOTE: many actions release via major
      # tags (v4 -> v5), so this keeps you on the current major. Remove this
      # ignore block if you want major action bumps proposed automatically.
      ignore:
          - dependency-name: '*'
            update-types:
                - version-update:semver-major
      groups:
          github-actions:
              patterns:
                  - '*'
